name: Release
'on':
  push:
    tags:
    - v*
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  build-and-push:
    name: Build and Push
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-24.04
        - platform: linux/arm64
          runner: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    - name: Prepare platform identifier
      id: platform
      run: 'platform="${{ matrix.platform }}"

        echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

        '
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.0.0
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6.0.0
      with:
        images: ghcr.io/${{ github.repository }}
        tags: 'type=semver,pattern={{version}}

          type=semver,pattern={{major}}.{{minor}}

          type=semver,pattern={{major}}

          type=raw,value=latest

          '
    - name: Build and Push by Digest
      id: build
      uses: docker/build-push-action@v7.1.0
      with:
        context: .
        file: ./Containerfile
        platforms: ${{ matrix.platform }}
        outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
        cache-from: type=gha,scope=build-${{ steps.platform.outputs.pair }}
        cache-to: type=gha,scope=build-${{ steps.platform.outputs.pair }},mode=max
        labels: ${{ steps.meta.outputs.labels }}
        build-args: 'VERSION=${{ fromJSON(steps.meta.outputs.json).labels[''org.opencontainers.image.version'']
          }}

          '
    - name: Export digest
      run: 'mkdir -p /tmp/digests

        digest="${{ steps.build.outputs.digest }}"

        touch "/tmp/digests/${digest#sha256:}"

        '
    - name: Upload digest
      uses: actions/upload-artifact@v7.0.1
      with:
        name: digests-${{ steps.platform.outputs.pair }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1
  merge-manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
    - name: Extract version
      id: version
      run: 'VERSION="${GITHUB_REF_NAME#v}"

        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

        echo "Version: ${VERSION}"

        '
    - name: Download digests
      uses: actions/download-artifact@v8.0.1
      with:
        pattern: digests-*
        path: /tmp/digests
        merge-multiple: true
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.0.0
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6.0.0
      with:
        images: ghcr.io/${{ github.repository }}
        tags: 'type=semver,pattern={{version}}

          type=semver,pattern={{major}}.{{minor}}

          type=semver,pattern={{major}}

          type=raw,value=latest

          '
    - name: Create manifest list and push
      working-directory: /tmp/digests
      run: "set -euo pipefail\n\n# Build tag arguments array (-t and tag as separate\
        \ elements)\nmapfile -t tag_args < <(jq -r '.tags[] | \"-t\", .' <<< \"$DOCKER_METADATA_OUTPUT_JSON\"\
        )\n\n# Build image references array\nimages=()\nfor digest_file in *; do\n\
        \  [[ -f \"$digest_file\" ]] || continue\n  images+=(\"ghcr.io/${{ github.repository\
        \ }}@sha256:${digest_file}\")\ndone\n\n# Create multi-arch manifest\ndocker\
        \ buildx imagetools create \"${tag_args[@]}\" \"${images[@]}\"\n"
    - name: Inspect image
      run: 'docker buildx imagetools inspect ${{ fromJSON(steps.meta.outputs.json).tags[0]
        }}

        '
    - name: Install cosign
      uses: sigstore/cosign-installer@v4.1.1
    - name: Sign container images
      env:
        COSIGN_EXPERIMENTAL: '1'
      run: "# Sign all tags created by metadata-action\nmapfile -t tags < <(echo \"\
        $DOCKER_METADATA_OUTPUT_TAGS\" | tr '\\n' ' ' | xargs -n1)\nfor tag in \"\
        ${tags[@]}\"; do\n  echo \"Signing ${tag}\"\n  cosign sign --yes \"${tag}\"\
        \ndone\n"
    - name: Generate container summary
      run: "IMAGE_TAG=\"${{ fromJSON(steps.meta.outputs.json).tags[0] }}\"\nMANIFEST_DIGEST=$(docker\
        \ buildx imagetools inspect \"${IMAGE_TAG}\" --format '{{.Manifest.Digest}}')\n\
        \n{\n  echo \"## Container Image\"\n  echo \"\"\n  echo \"### Image Tags\"\
        \n  echo \"\\`\\`\\`\"\n  echo \"$DOCKER_METADATA_OUTPUT_TAGS\"\n  echo \"\
        \\`\\`\\`\"\n  echo \"\"\n  echo \"### Platforms\"\n  docker buildx imagetools\
        \ inspect \"${IMAGE_TAG}\" --format '{{range .Manifest.Manifests}}- {{.Platform.OS}}/{{.Platform.Architecture}}{{if\
        \ .Platform.Variant}}/{{.Platform.Variant}}{{end}}{{\"\\n\"}}{{end}}'\n  echo\
        \ \"\"\n  echo \"### Manifest Digest\"\n  echo \"\\`${MANIFEST_DIGEST}\\`\"\
        \n  echo \"\"\n  echo \"### Signature\"\n  echo \"Image is signed with cosign\
        \ using keyless signing (Sigstore)\"\n  echo \"\"\n  echo \"**Verify signature:**\"\
        \n  echo \"\\`\\`\\`bash\"\n  echo \"cosign verify ${IMAGE_TAG} --certificate-identity-regexp=https://github.com/${{\
        \ github.repository }} --certificate-oidc-issuer=https://token.actions.githubusercontent.com\"\
        \n  echo \"\\`\\`\\`\"\n} >> \"$GITHUB_STEP_SUMMARY\"\n"
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: merge-manifests
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    - name: Generate release notes
      run: "VERSION=\"${GITHUB_REF_NAME#v}\"\n\n# Get previous tag (find tag before\
        \ current one)\nCURRENT_TAG=\"${GITHUB_REF_NAME}\"\nPREV_TAG=$(git tag --sort=-v:refname\
        \ | grep -v \"^${CURRENT_TAG}$\" | head -1)\n\n# Get commits since previous\
        \ tag\nif [ -n \"$PREV_TAG\" ]; then\n  COMMITS=$(git log \"${PREV_TAG}..HEAD\"\
        \ --format=\"%s\" --no-merges)\nelse\n  COMMITS=$(git log --format=\"%s\"\
        \ --no-merges)\nfi\n\n# Build changelog with emojis\nCHANGELOG_SECTION=\"\"\
        \nwhile IFS= read -r commit; do\n  [ -z \"$commit\" ] && continue\n\n  if\
        \ [[ \"$commit\" =~ ^(feat|fix|security|refactor|docs|perf|build)(\\([^\\\
        )]+\\))?:\\ (.+)$ ]]; then\n    TYPE=\"${BASH_REMATCH[1]}\"\n    SCOPE=\"\
        ${BASH_REMATCH[2]}\"\n    DESC=\"${BASH_REMATCH[3]}\"\n    SCOPE=\"${SCOPE#\\\
        (}\"; SCOPE=\"${SCOPE%\\)}\"\n\n    case \"$TYPE\" in\n      feat) emoji=\"\
        \u2728\" ;;\n      fix) emoji=\"\U0001F41B\" ;;\n      security) emoji=\"\U0001F512\
        \" ;;\n      *) emoji=\"\U0001F504\" ;;\n    esac\n\n    if [ -n \"$SCOPE\"\
        \ ]; then\n      CHANGELOG_SECTION=\"${CHANGELOG_SECTION}- ${emoji} ${SCOPE}:\
        \ ${DESC}\"$'\\n'\n    else\n      CHANGELOG_SECTION=\"${CHANGELOG_SECTION}-\
        \ ${emoji} ${DESC}\"$'\\n'\n    fi\n  fi\ndone <<< \"$COMMITS\"\n\n# Fallback\
        \ for empty changelog\nif [ -z \"$CHANGELOG_SECTION\" ]; then\n  CHANGELOG_SECTION=\"\
        No user-facing changes in this release.\"\nfi\n\n# Build release notes\n{\n\
        \  echo \"## Changelog\"\n  echo \"\"\n  echo \"${CHANGELOG_SECTION}\"\n \
        \ echo \"## Installation\"\n  echo \"\"\n  echo \"Add to your MCP client configuration:\"\
        \n  echo \"\"\n  echo \"\\`\\`\\`json\"\n  echo \"{\"\n  echo \"  \\\"mcpServers\\\
        \": {\"\n  echo \"    \\\"loki\\\": {\"\n  echo \"      \\\"command\\\": \\\
        \"podman\\\",\"\n  echo \"      \\\"args\\\": [\"\n  echo \"        \\\"run\\\
        \", \\\"--rm\\\", \\\"-i\\\",\"\n  echo \"        \\\"-e\\\", \\\"LOKI_URL=http://loki:3100\\\
        \",\"\n  echo \"        \\\"ghcr.io/${{ github.repository }}:${VERSION}\\\"\
        \"\n  echo \"      ]\"\n  echo \"    }\"\n  echo \"  }\"\n  echo \"}\"\n \
        \ echo \"\\`\\`\\`\"\n  echo \"\"\n  echo \"### Environment Variables\"\n\
        \  echo \"\"\n  echo \"| Variable | Description |\"\n  echo \"|----------|-------------|\"\
        \n  echo \"| \\\\\\`LOKI_URL\\\\\\` | Loki server URL (default: \\\\\\`http://localhost:3100\\\
        \\\\`) |\"\n  echo \"| \\\\\\`LOKI_USERNAME\\\\\\` | Basic auth username |\"\
        \n  echo \"| \\\\\\`LOKI_PASSWORD\\\\\\` | Basic auth password |\"\n  echo\
        \ \"| \\\\\\`LOKI_TOKEN\\\\\\` | Bearer token (alternative to basic auth)\
        \ |\"\n  echo \"| \\\\\\`LOKI_ORG_ID\\\\\\` | X-Scope-OrgID header for multi-tenant\
        \ Loki |\"\n  echo \"\"\n  echo \"## Verification\"\n  echo \"\"\n  echo \"\
        \\`\\`\\`bash\"\n  echo \"cosign verify ghcr.io/${{ github.repository }}:${VERSION}\
        \ \\\\\"\n  echo \"  --certificate-identity-regexp=https://github.com/${{\
        \ github.repository }} \\\\\"\n  echo \"  --certificate-oidc-issuer=https://token.actions.githubusercontent.com\"\
        \n  echo \"\\`\\`\\`\"\n} > release-notes.md\n\necho \"Generated release notes:\"\
        \ncat release-notes.md\n"
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3.0.0
      with:
        body_path: release-notes.md
        draft: false
        prerelease: false
