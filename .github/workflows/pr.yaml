name: PR Checks and Build
'on':
  pull_request_target:
    types:
    - opened
    - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: write
  security-events: write
jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Run Trivy vulnerability scanner (filesystem)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs-results.sarif
        severity: CRITICAL,HIGH,MEDIUM
    - name: Upload Trivy filesystem results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4.35.3
      with:
        sarif_file: trivy-fs-results.sarif
        category: trivy-filesystem
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Setup Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version: 1.26.2
        cache: true
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9.2.0
      with:
        version: latest
        args: --timeout=5m
    - name: markdownlint
      uses: DavidAnson/markdownlint-cli2-action@v23.2.0
      with:
        globs: '**/*.md'
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Setup Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version: 1.26.2
        cache: true
    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
    - name: Upload coverage
      uses: codecov/codecov-action@v6.0.0
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
  build-and-push:
    name: Build and Push (${{ matrix.arch }})
    needs:
    - security
    - lint
    - test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux/amd64
          arch: amd64
          runner: ubuntu-24.04
        - platform: linux/arm64
          arch: arm64
          runner: ubuntu-latest
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.0.0
    - name: Build and Push to ttl.sh by digest
      id: build
      uses: docker/build-push-action@v7.1.0
      with:
        context: .
        file: ./Containerfile
        platforms: ${{ matrix.platform }}
        outputs: type=image,name=ttl.sh/mcp-loki,push-by-digest=true,name-canonical=true,push=true
        cache-from: type=gha,scope=build-${{ matrix.arch }}
        cache-to: type=gha,scope=build-${{ matrix.arch }},mode=max
        build-args: 'VERSION=pr-${{ github.event.pull_request.number }}

          '
    - name: Export digest
      run: 'mkdir -p /tmp/digests

        digest="${{ steps.build.outputs.digest }}"

        touch "/tmp/digests/${digest#sha256:}"

        '
    - name: Upload digest
      uses: actions/upload-artifact@v7.0.1
      with:
        name: digests-${{ matrix.arch }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1
  merge-manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Download digests
      uses: actions/download-artifact@v8.0.1
      with:
        pattern: digests-*
        path: /tmp/digests
        merge-multiple: true
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.0.0
    - name: Create manifest list and push
      working-directory: /tmp/digests
      run: "set -euo pipefail\n\nPR_NUMBER=\"${{ github.event.pull_request.number\
        \ }}\"\nIMAGE_NAME=\"ttl.sh/mcp-loki\"\nTAG=\"pr-${PR_NUMBER}-1d\"\n\n# Build\
        \ image references array\nimages=()\nfor digest_file in *; do\n  [[ -f \"\
        $digest_file\" ]] || continue\n  images+=(\"${IMAGE_NAME}@sha256:${digest_file}\"\
        )\ndone\n\n# Create multi-arch manifest\ndocker buildx imagetools create \\\
        \n  --tag \"${IMAGE_NAME}:${TAG}\" \\\n  \"${images[@]}\"\n"
    - name: Inspect image
      run: 'PR_NUMBER="${{ github.event.pull_request.number }}"

        docker buildx imagetools inspect "ttl.sh/mcp-loki:pr-${PR_NUMBER}-1d"

        '
    - name: Generate build summary
      run: "PR_NUMBER=\"${{ github.event.pull_request.number }}\"\nIMAGE_TAG=\"ttl.sh/mcp-loki:pr-${PR_NUMBER}-1d\"\
        \n\n{\n  echo \"## Multi-arch Container Image\"\n  echo \"\"\n  echo \"###\
        \ Image Tag\"\n  echo \"- \\`${IMAGE_TAG}\\`\"\n  echo \"\"\n  echo \"###\
        \ Platforms\"\n  echo \"- linux/amd64\"\n  echo \"- linux/arm64\"\n  echo\
        \ \"\"\n  echo \"### Pull Command\"\n  echo '```bash'\n  echo \"podman pull\
        \ ${IMAGE_TAG}\"\n  echo '```'\n  echo \"\"\n  echo \"> **Note:** Image expires\
        \ in 24 hours (ttl.sh)\"\n} >> \"$GITHUB_STEP_SUMMARY\"\n"
  notify:
    name: Notify PR
    needs: merge-manifests
    runs-on: ubuntu-latest
    steps:
    - name: Check if first build
      id: first_build
      uses: actions/github-script@v9.0.0
      with:
        result-encoding: string
        script: "const labels = await github.rest.issues.listLabelsOnIssue({\n  owner:\
          \ context.repo.owner,\n  repo: context.repo.repo,\n  issue_number: context.payload.pull_request.number\n\
          });\n\nconst hasLabel = labels.data.some(label => label.name === 'Container\
          \ Available');\nreturn hasLabel ? 'false' : 'true';\n"
    - name: Add Container Available label
      if: steps.first_build.outputs.result == 'true'
      uses: actions/github-script@v9.0.0
      with:
        script: "github.rest.issues.addLabels({\n  owner: context.repo.owner,\n  repo:\
          \ context.repo.repo,\n  issue_number: context.payload.pull_request.number,\n\
          \  labels: ['Container Available']\n})\n"
    - name: Comment on PR (first time only)
      if: steps.first_build.outputs.result == 'true'
      uses: actions/github-script@v9.0.0
      with:
        script: "const prNumber = context.payload.pull_request.number;\nconst imageTag\
          \ = `ttl.sh/mcp-loki:pr-${prNumber}-1d`;\n\ngithub.rest.issues.createComment({\n\
          \  issue_number: prNumber,\n  owner: context.repo.owner,\n  repo: context.repo.repo,\n\
          \  body: `## Container image available\\n\\n**Multi-arch image (amd64 +\
          \ arm64):**\\n\\`\\`\\`bash\\npodman pull ${imageTag}\\n\\`\\`\\`\\n\\n>\
          \ **Note:** Image is rebuilt on every commit and expires after 24 hours\
          \ (hosted on ttl.sh).`\n})\n"
